<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>⚡ Nexus Office — OpenClaw AI Agents</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <!-- Status Bar -->
  <div class="status-bar">
    <div class="status-left">
      <span class="logo">⚡ Nexus Office</span>
      <span class="status-pill" id="gw-pill">Gateway: --</span>
      <span class="status-pill" id="tg-pill">Telegram: --</span>
      <span class="status-pill" id="line-pill">LINE: --</span>
    </div>
    <div class="status-right">
      <span id="agent-count">0 Agents</span>
      <span id="clock"></span>
    </div>
  </div>

  <!-- Main Canvas -->
  <canvas id="office"></canvas>

  <!-- Agent Info Panel (shown on hover) -->
  <div class="agent-panel" id="agent-panel" style="display:none">
    <div class="agent-panel-name" id="panel-name"></div>
    <div class="agent-panel-role" id="panel-role"></div>
    <div class="agent-panel-status" id="panel-status"></div>
  </div>

  <script src="js/pixel-sprites.js"></script>
  <script src="js/office-scene.js"></script>
  <script src="js/status-fetcher.js"></script>
  <script src="js/app.js"></script>
</body>
</html>

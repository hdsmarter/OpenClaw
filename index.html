<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>⚡ Nexus Dashboard — OpenClaw</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
</head>
<body>
  <div class="dashboard">
    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <h1>⚡ Nexus</h1>
        <span class="subtitle">Enterprise Enabler Dashboard</span>
      </div>
      <div class="header-right">
        <span class="version" id="version">--</span>
        <span class="last-updated" id="last-updated">--</span>
      </div>
    </header>

    <!-- Agent Visualizer -->
    <section class="card agent-card">
      <h2>Agent Status</h2>
      <div class="agent-display">
        <canvas id="agent-canvas" width="160" height="160"></canvas>
        <div class="agent-info">
          <div class="agent-state" id="agent-state">--</div>
          <div class="agent-uptime" id="agent-uptime">--</div>
        </div>
      </div>
    </section>

    <!-- Gateway Health -->
    <section class="card gateway-card">
      <h2>Gateway</h2>
      <div class="metric-grid">
        <div class="metric">
          <span class="metric-label">Status</span>
          <span class="metric-value" id="gw-status">--</span>
        </div>
        <div class="metric">
          <span class="metric-label">Port</span>
          <span class="metric-value" id="gw-port">18789</span>
        </div>
        <div class="metric">
          <span class="metric-label">Hostname</span>
          <span class="metric-value" id="gw-hostname">--</span>
        </div>
        <div class="metric">
          <span class="metric-label">Provider</span>
          <span class="metric-value">OpenRouter</span>
        </div>
      </div>
    </section>

    <!-- Channels Panel -->
    <section class="card channels-card">
      <h2>Channels</h2>
      <div class="channel-list">
        <div class="channel" id="ch-telegram">
          <span class="channel-icon">💬</span>
          <span class="channel-name">Telegram</span>
          <span class="channel-mode">polling</span>
          <span class="channel-status" id="ch-telegram-status">--</span>
        </div>
        <div class="channel" id="ch-line">
          <span class="channel-icon">🟢</span>
          <span class="channel-name">LINE</span>
          <span class="channel-mode">webhook</span>
          <span class="channel-status" id="ch-line-status">--</span>
        </div>
      </div>
    </section>

    <!-- Activity Timeline -->
    <section class="card timeline-card">
      <h2>Activity Timeline</h2>
      <div class="timeline" id="timeline">
        <div class="timeline-empty">No activity data yet</div>
      </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
      <span>OpenClaw Dashboard</span>
      <span>•</span>
      <a href="https://github.com/hdsmarter/OpenClaw" target="_blank">GitHub</a>
    </footer>
  </div>

  <script src="js/status-fetcher.js"></script>
  <script src="js/agent-visualizer.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
